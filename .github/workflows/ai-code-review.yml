name: AI Code Review

on:
  pull_request:
    branches: [ main ]

# The review needs to write comments back to the PR.
permissions:
  contents: read
  pull-requests: write

# Cancel superseded runs when new commits are pushed to the same PR.
concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-coder-7b-instruct-q4_0

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama daemon
        run: |
          ollama serve &
          echo "Waiting for Ollama to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:11434 > /dev/null; then
              echo "Ollama is up."; exit 0
            fi
            sleep 2
          done
          echo "Ollama did not come up in time" >&2; exit 1

      - name: Pull model (quantized 4-bit)
        run: ollama pull qwen2.5-coder:7b-instruct-q4_0

      - name: Run AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODEL: qwen2.5-coder:7b-instruct-q4_0
          # CPU-safe context. Higher = more RAM for KV cache; 16384 can OOM (HTTP 500) on a 16 GB runner.
          NUM_CTX: "8192"
          # Set to "true" ONLY if your repo/org allows Actions to approve PRs.
          ALLOW_APPROVE: "false"
        run: python3 scripts/review.py
